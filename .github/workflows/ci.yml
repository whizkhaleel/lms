name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: lms_test
  POSTGRES_USER: lms_user
  POSTGRES_PASSWORD: change_me
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  REDIS_PASSWORD: change_me
  JWT_ACCESS_SECRET: ci-test-secret
  JWT_REFRESH_SECRET: ci-test-refresh-secret
  PAYMENT_WEBHOOK_SECRET: ci-test-webhook-secret
  APP_URL: http://localhost:8080
  NODE_ENV: test

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lms_test
          POSTGRES_USER: lms_user
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: |
          for f in $(find . -name '*.js' -not -path './node_modules/*'); do
            node --check "$f" 2>/dev/null || echo "Syntax error in $f"
          done

      - name: Run unit tests
        run: npm run test:unit
        timeout-minutes: 5

      - name: Initialize database
        run: |
          for f in ../../database/init/*.sql; do
            psql -h localhost -U lms_user -d lms_test -f "$f"
          done
        timeout-minutes: 2
        env:
          PGPASSWORD: change_me

      - name: Start server & wait for health
        run: |
          mkdir -p "$LMSDATA_PATH/temp"
          node server.js &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/health > /dev/null && break
            sleep 1
          done
          curl -f http://localhost:5000/api/health
        timeout-minutes: 2
        env:
          LMSDATA_PATH: /home/runner/work/lms/lmsdata

      - name: Run integration tests
        run: npm run test:integration
        timeout-minutes: 10

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        timeout-minutes: 10
