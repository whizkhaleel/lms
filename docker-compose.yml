# ─────────────────────────────────────────────────────────────
#  LMS — Docker Compose (Development)
#  Services: nginx, frontend, backend, postgres, redis, minio
# ─────────────────────────────────────────────────────────────

networks:
  lms_network:
    driver: bridge

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  miniodata:
    driver: local
  lmsdata:
    driver: local

services:

  # ── Nginx — Reverse Proxy / API Gateway ────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lms_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # serve lmsdata public files directly (no backend hit)
      - lmsdata:/app/lmsdata:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lms_network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend — React + Vite ────────────────────────────────
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: lms_frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    networks:
      - lms_network

  # ── Backend — Node.js Express API ─────────────────────────
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: lms_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./apps/backend:/app
      - ./database:/app/database:ro
      - /app/node_modules
      # The critical mount: lmsdata lives here
      - lmsdata:/app/lmsdata
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms_network

  # ── Worker — Background Jobs (BullMQ) ─────────────────────
  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: lms_worker
    restart: unless-stopped
    command: node workers/index.js
    env_file:
      - .env
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
      - lmsdata:/app/lmsdata
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms_network

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Runs ALL files in /init on first container creation (ordered by filename).
      # Includes: migrations (001-003) + seed admin user (004).
      # NOTE: only runs when pgdata volume is empty (fresh start).
      # To re-run: docker compose down -v  then  docker compose up
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network

  # ── MinIO — S3-Compatible File Storage ────────────────────
  minio:
    image: minio/minio:latest
    container_name: lms_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - lms_network

  # ── pgAdmin — DB GUI (dev only) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lms.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - lms_network
    profiles:
      - tools   # only starts with: docker compose --profile tools up
