# ─────────────────────────────────────────────
#  Nginx — LMS Reverse Proxy
#  Routes: /api/* → backend:5000
#          /*     → frontend:3000
#          /lmsdata/uploads/public/* → static files (no auth)
# ─────────────────────────────────────────────

worker_processes auto;

events {
  worker_connections 1024;
}

http {

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ── Performance ────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json
                     application/javascript text/xml
                     application/xml application/xml+rss
                     text/javascript;

  # ── Upload size limit ──────────────────────
  client_max_body_size 500M;

  # ── Rate limiting zones ────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── HTTP server block ─────────────
  server {
    listen 80;
    server_name _;

    # Auth endpoints
    location ~ ^/api/v1/auth/(login|register|refresh) {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }

    # API
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # Public static files
    location /lmsdata/uploads/courses/ {
      alias /app/lmsdata/uploads/courses/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      location ~* \.(jpg|jpeg|png|webp|gif)$ {
        try_files $uri =404;
      }
    }

    location /lmsdata/ {
      return 403;
    }

    # Frontend
    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── Main server block (SSL) ─────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────
    add_header X-Frame-Options           "SAMEORIGIN"    always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header X-Content-Type-Options    "nosniff"       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Auth endpoints — strict rate limit ──
    location ~ ^/api/v1/auth/(login|register|refresh) {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
    }

    # ── API — all other routes ───────────────
    location /api/ {
      limit_req zone=api burst=50 nodelay;
      proxy_pass         http://backend:5000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # ── Public static files from lmsdata ────
    # Only the /uploads/public subdirectory is directly served.
    # Private files (submissions, etc.) must go through the API.
    location /lmsdata/uploads/courses/ {
      alias /app/lmsdata/uploads/courses/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      # Only allow image and video types here
      location ~* \.(jpg|jpeg|png|webp|gif)$ {
        try_files $uri =404;
      }
    }

    # Block everything else under lmsdata (force through API)
    location /lmsdata/ {
      return 403;
    }

    # ── Frontend — React SPA ─────────────────
    location / {
      proxy_pass         http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
