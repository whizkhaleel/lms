# ─────────────────────────────────────────────
#  Production override for docker-compose.yml
#  Use: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────

services:
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      # By default, this uses the development self-signed certs so the stack boots immediately.
      # To use real SSL certificates from Certbot, obtain them on the host VPS and uncomment the lines below:
      # - /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem:/etc/nginx/ssl/server.crt:ro
      # - /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem:/etc/nginx/ssl/server.key:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      target: production
    environment:
      - NODE_ENV=production
    restart: always

  backend:
    build:
      target: production
    environment:
      - NODE_ENV=production
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      target: production
    environment:
      - NODE_ENV=production
    restart: always

  postgres:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 1G
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro

  redis:
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    environment:
      - MINIO_BROWSER=off
    deploy:
      resources:
        limits:
          memory: 512M
